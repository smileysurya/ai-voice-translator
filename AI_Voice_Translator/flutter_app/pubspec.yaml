name: ai_voice_translator
description: AI-powered real-time voice translation app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Audio recording
  record: ^6.2.0

  # Audio playback
  just_audio: ^0.9.38

  # HTTP
  http: ^1.2.1

  # Permissions
  permission_handler: ^11.3.1

  # Storage
  shared_preferences: ^2.2.3
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.3.4

  # File paths
  path_provider: ^2.1.3
  path: ^1.9.0

  # Date formatting
  intl: ^0.19.0

  # UI
  google_fonts: ^6.2.1

  # TTS (uses Web Speech API on web — completely free)
  flutter_tts: ^4.0.2

  # Firebase Auth
  firebase_core: ^3.10.0
  firebase_auth: ^5.5.0

  # WebSockets for Real-Time Calling
  socket_io_client: ^3.0.0
  flutter_webrtc: ^0.12.1

  # Link Sharing
  share_plus: ^10.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
